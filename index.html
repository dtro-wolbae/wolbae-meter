<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전기실 전력사용량 검침</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

  :root {
    --bg: #f4f6f9;
    --surface: #ffffff;
    --surface2: #f0f2f5;
    --border: #dde1e8;
    --accent: #2563eb;
    --accent2: #1d4ed8;
    --accent-glow: rgba(37,99,235,0.1);
    --text: #1a1f2e;
    --text-muted: #6b7280;
    --red: #dc2626;
    --red-soft: rgba(220,38,38,0.08);
    --green: #16a34a;
    --yellow: #d97706;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: #ffffff;
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .header-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .header h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
    border: none;
    outline: none;
    background: none;
  }

  .header-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .header-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }

  /* Breadcrumb */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    overflow-x: auto;
    white-space: nowrap;
  }

  .breadcrumb-item { cursor: pointer; color: var(--accent); }
  .breadcrumb-item:hover { opacity: 0.7; }
  .breadcrumb-sep { color: var(--border); }
  .breadcrumb-current { color: var(--text-muted); }

  /* Main content */
  .main {
    padding: 20px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* Page */
  .page { display: none; }
  .page.active { display: block; }

  /* Station list */
  .page-title {
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .page-desc {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .month-selector {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
  }

  .month-selector label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .month-selector input {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    flex: 1;
    outline: none;
    cursor: pointer;
    color-scheme: light;
  }

  .station-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .station-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    width: 100%;
    color: var(--text);
    position: relative;
    overflow: hidden;
  }

  .station-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .station-btn:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateX(4px);
  }

  .station-btn:hover::before { opacity: 1; }

  .station-icon {
    display: none;
  }

  .station-info { flex: 1; }
  .station-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .station-detail { font-size: 11px; color: var(--text-muted); }
  .station-arrow { color: var(--text-muted); font-size: 16px; }

  /* Circuit list */
  .circuit-section {
    margin-bottom: 16px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    padding: 0 2px;
  }

  .circuit-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .circuit-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    width: 100%;
    color: var(--text);
  }

  .circuit-btn:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .circuit-badge {
    background: var(--accent-glow);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }

  .circuit-badge.배류기 {
    background: rgba(255,165,2,0.1);
    border-color: var(--yellow);
    color: var(--yellow);
  }

  .circuit-badge.충전소 {
    background: rgba(46,213,115,0.1);
    border-color: var(--green);
    color: var(--green);
  }

  .circuit-info { flex: 1; }
  .circuit-name { font-size: 14px; font-weight: 600; }
  .circuit-type { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .circuit-status { font-size: 12px; }
  .status-done { color: var(--green); }
  .status-pending { color: var(--text-muted); }

  /* Input page */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .input-card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .input-card-title .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .input-group {
    margin-bottom: 16px;
  }

  .input-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .input-label .unit {
    font-size: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    color: var(--accent);
  }

  .input-field {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 18px;
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  .input-field::-webkit-outer-spin-button,
  .input-field::-webkit-inner-spin-button { -webkit-appearance: none; }

  .input-field:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .input-field::placeholder { color: #b0b8c8; font-weight: 400; font-size: 14px; }

  /* Reference display */
  .ref-display {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ref-label { font-size: 12px; color: var(--text-muted); }
  .ref-value { font-size: 18px; font-weight: 700; color: var(--text); }

  /* Usage display */
  .usage-display {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.3s;
  }

  .usage-display.normal { border-color: var(--green); background: rgba(46,213,115,0.05); }
  .usage-display.warning { border-color: var(--red); background: var(--red-soft); }
  .usage-display.caution { border-color: var(--yellow); background: rgba(217,119,6,0.06); }
  .usage-display.empty { border-color: var(--border); }

  .usage-label { font-size: 12px; color: var(--text-muted); }
  .usage-value { font-size: 18px; font-weight: 700; }
  .usage-value.normal { color: var(--green); }
  .usage-value.warning { color: var(--red); }
  .usage-value.caution { color: var(--yellow); }
  .usage-value.empty { color: var(--text-muted); }

  .warning-msg {
    font-size: 11px;
    color: var(--red);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Sub input for 유효/무효 */
  .sub-inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .sub-input-group .input-label { font-size: 11px; }
  .sub-input-group .input-field { font-size: 15px; padding: 10px 12px; }

  /* Photo upload */
  .photo-upload {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .photo-upload:hover { border-color: var(--green); }
  .photo-upload input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .photo-upload-icon { font-size: 32px; margin-bottom: 8px; }
  .photo-upload-text { font-size: 13px; font-weight: 600; color: var(--green); }
  .photo-upload-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  .photo-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .photo-thumb {
    width: 80px;
    height: 80px;
    border-radius: 8px;
    object-fit: cover;
    border: 2px solid var(--green);
    position: relative;
  }

  .photo-thumb-wrap { position: relative; display: inline-block; }

  .photo-remove {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 20px;
    height: 20px;
    background: var(--red);
    border-radius: 50%;
    border: none;
    color: white;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  /* Buttons */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 20px;
    border-radius: 12px;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }

  .btn-primary {
    background: var(--accent);
    color: #ffffff;
    box-shadow: 0 2px 8px rgba(37,99,235,0.25);
  }

  .btn-primary:hover { box-shadow: 0 4px 12px rgba(37,99,235,0.35); transform: translateY(-1px); }

  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-secondary:hover { border-color: var(--accent); }

  .btn-danger {
    background: var(--red-soft);
    border: 1px solid var(--red);
    color: var(--red);
  }

  .btn-success {
    background: var(--green);
    border: none;
    color: #ffffff;
    font-size: 14px;
    padding: 14px 20px;
    box-shadow: 0 2px 8px rgba(22,163,74,0.25);
  }

  .btn-success:hover { box-shadow: 0 4px 12px rgba(22,163,74,0.35); transform: translateY(-1px); }

  .btn-sm {
    padding: 8px 14px;
    font-size: 12px;
    border-radius: 8px;
    width: auto;
  }

  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn { flex: 1; }

  /* Download section */
  .download-section {
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .download-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .download-desc {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  /* Progress summary */
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 3px;
    transition: width 0.5s;
  }

  .progress-text { font-size: 12px; color: var(--text-muted); }
  .progress-pct { font-size: 14px; font-weight: 700; color: var(--accent); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 9999;
    transition: transform 0.3s;
    white-space: nowrap;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid transparent;
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Back button in header */
  .btn-back {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    padding: 6px 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-back:hover { border-color: var(--accent); color: var(--accent); }

  /* ── 로그인 오버레이 ── */
  .login-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 9000;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%; max-width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
  }
  .login-logo { font-size: 36px; text-align: center; margin-bottom: 8px; }
  .login-title { font-size: 18px; font-weight: 900; text-align: center; margin-bottom: 4px; }
  .login-sub { font-size: 12px; color: var(--text-muted); text-align: center; margin-bottom: 28px; }
  .login-input {
    width: 100%; background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 13px 16px; font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px; font-weight: 600; outline: none;
    transition: border-color 0.2s; margin-bottom: 12px; color: var(--text);
  }
  .login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .login-user-name {
    font-size: 15px; font-weight: 700; color: var(--accent);
    text-align: center; margin-bottom: 16px; min-height: 22px;
  }
  .login-error { font-size: 12px; color: var(--red); text-align: center; margin-bottom: 12px; min-height: 18px; }

  /* ── 헤더 사용자 뱃지 ── */
  .user-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    cursor: pointer; padding: 4px 8px;
    border: 1px solid var(--border); border-radius: 20px;
    white-space: nowrap; overflow: hidden; max-width: 90px;
  }
  .user-badge:active { background: var(--surface2); }

  /* ── 관리자 페이지 ── */
  .admin-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 8000;
    display: none;
    flex-direction: column;
  }
  .admin-overlay.active { display: flex; }
  .admin-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .admin-body { flex: 1; overflow-y: auto; padding: 20px; max-width: 600px; width: 100%; margin: 0 auto; }
  .staff-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 8px;
  }
  .staff-num { font-size: 12px; color: var(--text-muted); width: 60px; }
  .staff-name { font-size: 15px; font-weight: 700; flex: 1; }
  .staff-del {
    background: var(--red-soft); border: 1px solid var(--red);
    color: var(--red); border-radius: 8px; padding: 6px 12px;
    font-size: 12px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .add-staff-row {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .add-staff-row input {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 11px 14px;
    font-family: 'Noto Sans KR', sans-serif; font-size: 14px;
    font-weight: 600; outline: none; color: var(--text);
    transition: border-color 0.2s; min-width: 0;
  }
  .add-staff-row input:focus { border-color: var(--accent); }
  .add-staff-row input.num { flex: 1; }
  .add-staff-row input.name { flex: 1; }

  /* 검침자 표시 */
  .inspector-tag {
    font-size: 11px; color: var(--accent); font-weight: 600;
    background: var(--accent-glow); border: 1px solid var(--accent);
    border-radius: 6px; padding: 2px 7px; margin-left: 6px;
  }
</style>
</head>
<body>

<!-- ── 로그인 오버레이 ── -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">⚡</div>
    <div class="login-title">전기실 전력사용량</div>
    <div class="login-sub">사번과 공동 비밀번호를 입력하세요</div>
    <input class="login-input" type="text" id="loginNumInput" placeholder="사번 입력"
      inputmode="numeric" maxlength="10" onkeydown="if(event.key==='Enter') document.getElementById('loginPwInput').focus()" />
    <input class="login-input" type="password" id="loginPwInput" placeholder="공동 비밀번호"
      inputmode="numeric" maxlength="20" onkeydown="if(event.key==='Enter') doLogin()" />
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-primary" onclick="doLogin()" style="margin-bottom:12px">로그인</button>
    <button class="btn btn-secondary" style="font-size:12px;padding:10px;" onclick="openAdminFromLogin()">🔧 관리자</button>
  </div>
</div>

<!-- ── 관리자 PIN 입력 화면 ── -->
<div class="login-overlay" id="adminPinOverlay" style="display:none;z-index:9500;">
  <div class="login-box">
    <div class="login-logo">🔧</div>
    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">관리자 PIN을 입력하세요</div>
    <input class="login-input" type="password" id="adminPinInput" placeholder="PIN 입력"
      inputmode="numeric" maxlength="10"
      onkeydown="if(event.key==='Enter') doAdminLogin()" />
    <div class="login-error" id="adminPinError"></div>
    <button class="btn btn-primary" onclick="doAdminLogin()" style="margin-bottom:12px">확인</button>
    <button class="btn btn-secondary" style="font-size:12px;padding:10px;" onclick="closeAdminPin()">취소</button>
  </div>
</div>
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-header">
    <button class="btn-back" style="display:block" onclick="adminBack()">←</button>
    <div style="font-size:16px;font-weight:900;flex:1;" id="adminHeaderTitle">🔧 관리자</div>
  </div>
  <div class="admin-body">

    <!-- 메인 메뉴 -->
    <div id="adminMenu">

// AUTH & ADMIN

let ADMIN_PIN = '2926';
let SHARED_PW = '2926';
let currentUser = null; // { num, name }
let staffList = {};     // { '20010': '홍길동', ... }

function loadAuth() {
  const saved = localStorage.getItem('meter_user');
  if (saved) {
    try { currentUser = JSON.parse(saved); } catch(e) { currentUser = null; }
  }
}

function saveAuth(num, name) {
  currentUser = { num, name };
  localStorage.setItem('meter_user', JSON.stringify(currentUser));
}

function clearAuth() {
  currentUser = null;
  localStorage.removeItem('meter_user');
}

async function loadStaffFromFirebase() {
  if (!db) return;
  try {
    const doc = await db.collection('config').doc('staff').get();
    if (doc.exists) {
      staffList = doc.data().employees || {};
      if (doc.data().adminPin) ADMIN_PIN = doc.data().adminPin;
      if (doc.data().sharedPw) SHARED_PW = doc.data().sharedPw;
    }
  } catch(e) { staffList = {}; }
}

async function saveStaffToFirebase() {
  if (!db) return;
  await db.collection('config').doc('staff').set({
    employees: staffList,
    adminPin: ADMIN_PIN,
    sharedPw: SHARED_PW,
  });
}

function doLogin() {
  const num = document.getElementById('loginNumInput').value.trim();
  const pw = document.getElementById('loginPwInput').value.trim();
  const errEl = document.getElementById('loginError');
  if (!num) { errEl.textContent = '사번을 입력해주세요.'; return; }
  if (!staffList[num]) { errEl.textContent = '등록되지 않은 사번입니다.'; return; }
  if (pw !== SHARED_PW) { errEl.textContent = '비밀번호가 올바르지 않습니다.'; return; }
  saveAuth(num, staffList[num]);
  showUserBadge();
  document.getElementById('loginOverlay').style.display = 'none';
}

function showUserBadge() {
  if (!currentUser) return;
  document.getElementById('userBadgeName').textContent = currentUser.name;
  document.getElementById('userBadge').style.display = 'flex';
}

function confirmLogout() {
  if (confirm(`${currentUser.name}님, 로그아웃 하시겠어요?`)) {
    clearAuth();
    document.getElementById('userBadge').style.display = 'none';
    document.getElementById('loginNumInput').value = '';
    document.getElementById('loginPwInput').value = '';
    document.getElementById('loginError').textContent = '';
    document.getElementById('loginOverlay').style.display = 'flex';
  }
}

// 관리자 진입
function openAdminFromLogin() {
  document.getElementById('adminPinInput').value = '';
  document.getElementById('adminPinError').textContent = '';
  document.getElementById('adminPinOverlay').style.display = 'flex';
}

function closeAdminPin() {
  document.getElementById('adminPinOverlay').style.display = 'none';
}

function doAdminLogin() {
  const pin = document.getElementById('adminPinInput').value.trim();
  if (pin === ADMIN_PIN) {
    closeAdminPin();
    document.getElementById('loginOverlay').style.display = 'none';
    openAdmin();
  } else {
    document.getElementById('adminPinError').textContent = 'PIN이 올바르지 않습니다.';
  }
}

function openAdmin() {
  document.getElementById('adminMenu').style.display = 'block';
  document.getElementById('adminSecurity').style.display = 'none';
  document.getElementById('adminStaff').style.display = 'none';
  document.getElementById('adminHeaderTitle').textContent = '🔧 관리자';
  document.getElementById('newAdminPin').value = '';
  document.getElementById('newSharedPw').value = '';
  document.getElementById('adminOverlay').classList.add('active');
}

function showAdminSection(section) {
  document.getElementById('adminMenu').style.display = 'none';
  document.getElementById('adminSecurity').style.display = 'none';
  document.getElementById('adminStaff').style.display = 'none';
  if (section === 'security') {
    document.getElementById('adminSecurity').style.display = 'block';
    document.getElementById('adminHeaderTitle').textContent = '🔐 보안 설정';
  } else if (section === 'staff') {
    renderStaffList();
    document.getElementById('adminStaff').style.display = 'block';
    document.getElementById('adminHeaderTitle').textContent = '👷 직원 관리';
  }
}

function adminBack() {
  const secVisible = document.getElementById('adminSecurity').style.display !== 'none';
  const staffVisible = document.getElementById('adminStaff').style.display !== 'none';
  if (secVisible || staffVisible) {
    // 서브 섹션 → 메인 메뉴로
    document.getElementById('adminMenu').style.display = 'block';
    document.getElementById('adminSecurity').style.display = 'none';
    document.getElementById('adminStaff').style.display = 'none';
    document.getElementById('adminHeaderTitle').textContent = '🔧 관리자';
  } else {
    closeAdmin();
  }
}

function closeAdmin() {
  document.getElementById('adminOverlay').classList.remove('active');
  if (!currentUser) {
    document.getElementById('loginOverlay').style.display = 'flex';
  }
}

async function changeAdminPin() {
  const val = document.getElementById('newAdminPin').value.trim();
  if (!val) { showToast('새 PIN을 입력하세요.', 'error'); return; }

  await saveStaffToFirebase();
  document.getElementById('newAdminPin').value = '';
  showToast('관리자 PIN이 변경되었습니다.', 'success');
}

async function changeSharedPw() {
  const val = document.getElementById('newSharedPw').value.trim();
  if (!val) { showToast('새 비밀번호를 입력하세요.', 'error'); return; }
  SHARED_PW = val;
  await saveStaffToFirebase();
  document.getElementById('newSharedPw').value = '';
  showToast('공동 비밀번호가 변경되었습니다.', 'success');
}

function renderStaffList() {
  const container = document.getElementById('staffList');
  const entries = Object.entries(staffList).sort((a,b) => a[0].localeCompare(b[0]));
  if (entries.length === 0) {
    container.innerHTML = `<div style="text-align:center;color:var(--text-muted);font-size:13px;padding:20px;">등록된 직원이 없습니다.</div>`;
    return;
  }
  container.innerHTML = entries.map(([num, name]) => `
    <div class="staff-item">
      <div class="staff-num">${num}</div>
      <div class="staff-name">${name}</div>
      <button class="staff-del" onclick="deleteStaff('${num}')">삭제</button>
    </div>
  `).join('');
}

async function addStaff() {
  const num = document.getElementById('newStaffNum').value.trim();
  const name = document.getElementById('newStaffName').value.trim();
  if (!num || !name) { showToast('사번과 이름을 모두 입력하세요.', 'error'); return; }
  if (staffList[num]) { showToast('이미 등록된 사번입니다.', 'error'); return; }
  staffList[num] = name;
  // 입력란 즉시 비우고 화면 즉시 업데이트
  document.getElementById('newStaffNum').value = '';
  document.getElementById('newStaffName').value = '';
  renderStaffList();
  showToast(`${name} 직원이 추가되었습니다.`, 'success');
  // Firebase는 백그라운드로 저장
  saveStaffToFirebase().catch(() => showToast('저장 중 오류가 발생했습니다.', 'error'));
}

async function deleteStaff(num) {
  const name = staffList[num];
  if (!confirm(`${name}(${num}) 직원을 삭제하시겠어요?`)) return;
  delete staffList[num];
  // 화면 즉시 업데이트
  renderStaffList();
  showToast(`${name} 직원이 삭제되었습니다.`, 'success');
  // Firebase는 백그라운드로 저장
  saveStaffToFirebase().catch(() => showToast('저장 중 오류가 발생했습니다.', 'error'));
}

// ===========================
// INIT
// ===========================
async function init() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('selectedMonth').value = `${y}-${m}`;
  updateMonth();

  // Firebase에서 직원명단 + 검침데이터 순서대로 로드
  await loadStaffFromFirebase();
  await new Promise(resolve => loadFromFirebase(resolve));

  // 직원명단 로드 완료 후 로그인 상태 검증
  loadAuth();
  if (currentUser && staffList[currentUser.num]) {
    showUserBadge();
    document.getElementById('loginOverlay').style.display = 'none';
  } else {
    clearAuth();
    document.getElementById('loginOverlay').style.display = 'flex';
  }

  renderStations();
  startRealtimeSync();
}

function updateMonth() {
  const val = document.getElementById('selectedMonth').value;
  if (val) {
    const [y,m] = val.split('-');
    document.getElementById('month-display').textContent = `${y}년 ${parseInt(m)}월 검침 데이터를 입력합니다.`;
    Object.keys(inputData).forEach(k => delete inputData[k]);
    if (typeof loadFromFirebase === 'function') {
      loadFromFirebase(() => { renderStations(); startRealtimeSync(); });
    } else {
      renderStations();
    }
  }
}

function getSelectedMonthStr() {
  const val = document.getElementById('selectedMonth').value;
  if (!val) return '';
  const [y,m] = val.split('-');
  return `${y}년 ${parseInt(m)}월`;
}

// ===========================
// RENDER STATIONS
// ===========================
function renderStations() {
  const grid = document.getElementById('stationGrid');
  grid.innerHTML = STATIONS.map(s => {
    const done = getStationDone(s);
    const total = getStationTotal(s);
    const pct = total > 0 ? Math.round(done/total*100) : 0;
    const isComplete = done === total && total > 0;
    const bgStyle = isComplete
      ? 'background:#f0fdf4;border-color:#16a34a;'
      : `background:linear-gradient(to right, rgba(59,130,246,0.08) ${pct}%, #ffffff ${pct}%);`;
    return `
      <button class="station-btn" onclick="selectStation('${s.id}')" style="${bgStyle}${isComplete ? '' : ''}">
        <div class="station-icon">${s.icon}</div>
        <div class="station-info">
          <div class="station-name" style="${isComplete ? 'color:#16a34a;font-weight:900;' : ''}">
            ${s.name}
            ${s.hasBalugi ? `<span style="font-size:10px;color:#4b5563;font-weight:500;margin-left:4px;">⚡배류기</span>` : ''}
            ${s.hasCharger ? `<span style="font-size:10px;color:#4b5563;font-weight:500;margin-left:4px;">🚗충전소</span>` : ''}
          </div>
        </div>
        ${isComplete
          ? `<span style="font-size:20px;">✅</span>`
          : `<span style="font-size:12px;color:var(--text-muted);margin-right:4px;">${done}/${total}</span><span class="station-arrow">›</span>`}
      </button>
    `;
  }).join('');
  updateProgress();
}

function getStationTotal(s) {
  let t = s.circuits.length;
  if (s.hasBalugi) t++;
  if (s.hasCharger) t++;
  return t;
}

function getStationDone(s) {
  if (!inputData[s.id]) return 0;
  let done = 0;
  s.circuits.forEach(c => {
    if (inputData[s.id][c] && inputData[s.id][c].current !== '') done++;
  });
  if (s.hasBalugi && inputData[s.id]['배류기'] && inputData[s.id]['배류기'].current !== '') done++;
  if (s.hasCharger && inputData[s.id]['전기차충전소'] && inputData[s.id]['전기차충전소'].current !== '') done++;
  return done;
}

function updateProgress() {
  let total = 0, done = 0;
  STATIONS.forEach(s => {
    total += getStationTotal(s);
    done += getStationDone(s);
  });
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('progressText').textContent = `${done}/${total} 검침 완료`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

// ===========================
// NAVIGATION
// ===========================
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
  document.getElementById('btnBack').style.display = pageId === 'stations' ? 'none' : '';
  window.scrollTo(0,0);
}

function goBack() {
  if (navStack.length > 0) {
    const prev = navStack.pop();
    if (prev === 'stations') {
      showPage('stations');
      renderStations();
      updateBreadcrumb([]);
      document.getElementById('headerTitle').textContent = '⚡ 전기실 전력사용량';
    } else if (prev === 'circuits') {
      showPage('circuits');
      renderCircuits(currentStation);
      updateBreadcrumb([currentStation.name]);
    }
  }
}

function updateBreadcrumb(path) {
  const bc = document.getElementById('breadcrumb');
  let html = `<span class="breadcrumb-item" onclick="goToStations()">역사 선택</span>`;
  path.forEach((p, i) => {
    html += `<span class="breadcrumb-sep">›</span>`;
    if (i < path.length - 1) {
      html += `<span class="breadcrumb-item">${p}</span>`;
    } else {
      html += `<span class="breadcrumb-current">${p}</span>`;
    }
  });
  bc.innerHTML = html;
}

function goToStations() {
  navStack = [];
  showPage('stations');
  renderStations();
  updateBreadcrumb([]);
}

function selectCircuit(circuitKey, circuitType) {
  currentCircuit = circuitKey;
  currentCircuitType = circuitType;
  navStack.push('circuits');

  if (!inputData[currentStation.id]) inputData[currentStation.id] = {};
  if (!inputData[currentStation.id][circuitKey]) {
    inputData[currentStation.id][circuitKey] = { current: '', photos: [] };
    if (currentStation.isDigital && circuitType === 'circuit') {
      inputData[currentStation.id][circuitKey].jasang = '';
      inputData[currentStation.id][circuitKey].jinsang = '';
    }
  }

  renderInputForm();
  showPage('input');
  updateBreadcrumb([currentStation.name, circuitKey]);
}

function getPrevData() {
  const s = currentStation;
  const c = currentCircuit;
  const monthKey = getMonthKey(); // 예: "2026-04"

  // 4월 검침 → 엑셀 3월 하드코딩 값만 사용
  if (monthKey === '2026-04') {
    const pd = PREV_DATA[s.id];
    if (!pd) return null;
    if (currentCircuitType === 'balugi') return pd.balugi || null;
    if (currentCircuitType === 'charger') return pd.charger || null;
    return pd[c] || null;
  }

  // 5월 이후 → Firebase 전달 금월지침만 사용 (없으면 null, 표시 안 함)
  if (!prevMonthFirebaseData || !prevMonthFirebaseData[s.id]) return null;

  const fd = prevMonthFirebaseData[s.id];
  const ck = currentCircuitType === 'balugi' ? '배류기'
           : currentCircuitType === 'charger' ? '전기차충전소'
           : c;
  const fEntry = fd[ck];
  if (!fEntry || fEntry.current === '' || fEntry.current === undefined) return null;

  // ratio는 PREV_DATA에서 가져옴 (배율은 변하지 않으므로)
  const staticPd = PREV_DATA[s.id];
  const staticEntry = staticPd
    ? (currentCircuitType === 'balugi' ? staticPd.balugi
     : currentCircuitType === 'charger' ? staticPd.charger
     : staticPd[c])
    : null;
  const ratio = staticEntry ? staticEntry.ratio : undefined;

  // 디지털 역사 무효분 전월지침도 Firebase에서
  let prevMvar = undefined;
  if (s.isDigital && currentCircuitType === 'circuit') {
    const jasang = parseFloat(fEntry.jasang) || 0;
    const jinsangRaw = parseFloat(fEntry.jinsang) || 0;
    const unit = fEntry.jinsangUnit || 'mvarh';
    const jinsang = unit === 'kvarh' ? jinsangRaw / 1000
                  : unit === 'varh'  ? jinsangRaw / 1000000
                  : jinsangRaw;
    prevMvar = jasang + jinsang;
  }

  const result = { prev: parseFloat(fEntry.current) };
  if (ratio !== undefined) result.ratio = ratio;
  if (prevMvar !== undefined) result.prevMvar = prevMvar;
  if (fEntry.usageDiff !== undefined && fEntry.usageDiff !== '') result.prevUsageDiff = parseFloat(fEntry.usageDiff);
  return result;
}

function updateUsage() {
  const input = document.getElementById('currentInput');
  const display = document.getElementById('usageDisplay');
  const val = document.getElementById('usageValue');
  const warn = document.getElementById('warningMsg');
  if (!input || !display || !val) return;

  const current = parseFloat(input.value);
  const prev = getPrevData();
  const prevVal = prev ? prev.prev : null;

  if (isNaN(current) || input.value === '') {
    display.className = 'usage-display empty';
    val.className = 'usage-value empty';
    val.textContent = '—';
    warn.style.display = 'none';
    return;
  }

  if (prevVal === null) {
    display.className = 'usage-display normal';
    val.className = 'usage-value normal';
    val.textContent = current.toFixed(3);
    warn.style.display = 'none';
    return;
  }

  const diff = current - prevVal;

  // 경고 조건:
  // 1. 사용지침이 음수 (금월 < 전월)
  // 2. 전달 사용지침 대비 2배 이상 차이
  let isWarning = diff < 0;
  let isCaution = false;
  let warnMsg = '⚠ 비정상적인 값입니다. 입력값을 확인하세요.';

  const prev2 = prev.prevUsageDiff;
  if (!isWarning && prev2 !== undefined && prev2 > 0 && diff > prev2 * 2) {
    isCaution = true;
    warnMsg = `⚠ 전달 사용지침(${prev2.toFixed(2)})의 2배 이상입니다.`;
  }
  if (!isWarning && !isCaution && prev2 !== undefined && prev2 > 0 && diff < prev2 / 2) {
    isCaution = true;
    warnMsg = `⚠ 전달 사용지침(${prev2.toFixed(2)})의 절반 이하입니다.`;
  }

  const stateClass = isWarning ? 'warning' : isCaution ? 'caution' : 'normal';
  display.className = 'usage-display ' + stateClass;
  val.className = 'usage-value ' + stateClass;
  val.textContent = diff.toFixed(3);
  if (isWarning || isCaution) {
    warn.textContent = warnMsg;
    warn.dataset.block = isWarning ? 'true' : 'false';
    warn.style.color = isCaution ? 'var(--yellow)' : 'var(--red)';
    warn.style.display = 'flex';
  } else {
    warn.style.display = 'none';
  }
}

function updateMvarUsage() {
  const jasangEl  = document.getElementById('jasangInput');
  const jinsangEl = document.getElementById('jinsangInput');
  const unitEl    = document.getElementById('jinsangUnit');
  const totalEl   = document.getElementById('mvarTotal');
  const dispEl    = document.getElementById('mvarUsageDisplay');
  const usageEl   = document.getElementById('mvarUsageValue');
  const warnEl    = document.getElementById('mvarWarningMsg');
  if (!jasangEl || !jinsangEl || !totalEl) return;

  const jasang  = parseFloat(jasangEl.value);
  const jinsangRaw = parseFloat(jinsangEl.value);
  const unit    = unitEl ? unitEl.value : 'mvarh';

  // 단위 변환 → MVARh
  let jinsangMvar = NaN;
  if (!isNaN(jinsangRaw)) {
    if (unit === 'mvarh') jinsangMvar = jinsangRaw;
    else if (unit === 'kvarh') jinsangMvar = jinsangRaw / 1000;
    else if (unit === 'varh')  jinsangMvar = jinsangRaw / 1000000;
  }

  const hasJasang  = !isNaN(jasang);
  const hasJinsang = !isNaN(jinsangMvar);

  if (!hasJasang && !hasJinsang) {
    totalEl.textContent = '—';
    if (dispEl) { dispEl.className = 'usage-display empty'; }
    if (usageEl) { usageEl.className = 'usage-value empty'; usageEl.textContent = '— MVARh'; }
    if (warnEl) warnEl.style.display = 'none';
    return;
  }

  const total = (hasJasang ? jasang : 0) + (hasJinsang ? jinsangMvar : 0);
  totalEl.textContent = total.toFixed(3) + ' MVARh';

  if (!dispEl || !usageEl) return;

  const prev = getPrevData();
  const prevMvar = prev ? prev.prevMvar : null;

  if (prevMvar === null) {
    dispEl.className = 'usage-display normal';
    usageEl.className = 'usage-value normal';
    usageEl.textContent = total.toFixed(3) + ' MVARh';
    if (warnEl) warnEl.style.display = 'none';
    return;
  }

  const diff = total - prevMvar;
  const isWarning = diff < 0 || diff > Math.abs(prevMvar * 0.5 + 10);
  dispEl.className = 'usage-display ' + (isWarning ? 'warning' : 'normal');
  usageEl.className = 'usage-value ' + (isWarning ? 'warning' : 'normal');
  usageEl.textContent = diff.toFixed(3) + ' MVARh';
  if (warnEl) warnEl.style.display = isWarning ? 'flex' : 'none';
}

function handlePhotoUpload(e) {
  const data = inputData[currentStation.id][currentCircuit];
  if (data.photos.length >= 1) {
    showToast('사진은 1장만 첨부할 수 있습니다.', 'error');
    return;
  }
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    data.photos = [{ name: file.name, src: ev.target.result }];
    renderPhotos();
  };
  reader.readAsDataURL(file);
}

function renderPhotos() {
  const data = inputData[currentStation.id][currentCircuit];
  const preview = document.getElementById('photoPreview');
  const uploadArea = document.querySelector('.photo-upload');
  if (!preview) return;
  preview.innerHTML = data.photos.map((p, i) => `
    <div class="photo-thumb-wrap">
      <img class="photo-thumb" src="${p.src}" alt="${p.name}">
      <button class="photo-remove" onclick="removePhoto(${i})">×</button>
    </div>
  `).join('');
  if (uploadArea) uploadArea.style.display = data.photos.length >= 1 ? 'none' : '';
}

function removePhoto(idx) {
  inputData[currentStation.id][currentCircuit].photos.splice(idx, 1);
  renderPhotos();
}

function saveInput() {
  const input = document.getElementById('currentInput');
  if (!input) return;

  // 1. 값 미입력 차단
  if (input.value.trim() === '') {
    showToast('검침값을 입력해주세요.', 'error');
    return;
  }

  // 2. 비정상값이면 저장 차단 (음수 사용지침만 차단, 2배 경고는 저장 허용)
  const warn = document.getElementById('warningMsg');
  const mvarWarn = document.getElementById('mvarWarningMsg');
  if (warn && warn.style.display !== 'none' && warn.dataset.block === 'true') {
    showToast('⚠ 금월지침이 전월지침보다 낮습니다. 확인 후 저장하세요.', 'error');
    return;
  }
  if (mvarWarn && mvarWarn.style.display !== 'none') {
    showToast('⚠ 무효분 값이 비정상입니다. 확인 후 저장하세요.', 'error');
    return;
  }

  const val = input.value.trim();
  const data = inputData[currentStation.id][currentCircuit];
  data.current = val;
  data.inspector = currentUser ? currentUser.name : '';

  // 사용지침(diff) 계산해서 같이 저장 (다음달 경고 비교용)
  const prev = getPrevData();
  const prevVal = prev ? prev.prev : null;
  if (prevVal !== null && !isNaN(parseFloat(val))) {
    data.usageDiff = parseFloat(val) - prevVal;
  }

  if (currentStation.isDigital && currentCircuitType === 'circuit') {
    const j = document.getElementById('jasangInput');
    const ji = document.getElementById('jinsangInput');
    const ju = document.getElementById('jinsangUnit');
    if (j) data.jasang = j.value.trim();
    if (ji) data.jinsang = ji.value.trim();
    if (ju) data.jinsangUnit = ju.value;
  }

  // 2. 다음 호계 찾기 (circuit 타입만, 배류기/충전소는 자동이동 제외)
  const nextCircuit = currentCircuitType === 'circuit'
    ? currentStation.circuits[currentStation.circuits.indexOf(currentCircuit) + 1]
    : null;

  showToast('저장되었습니다 ✓', 'success');
  if (typeof saveToFirebase === 'function') saveToFirebase();
  setTimeout(() => {
    navStack.pop();
    if (nextCircuit) {
      // 다음 호계로 바로 이동
      selectCircuit(nextCircuit, 'circuit');
    } else {
      // 마지막이거나 배류기/충전소면 호계 목록으로
      showPage('circuits');
      renderCircuits(currentStation);
      updateBreadcrumb([currentStation.name]);
    }
    renderStations();
    updateProgress();
  }, 800);
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 2000);
}

function downloadExcel() {
  try {
    const monthStr = getSelectedMonthStr();
    const wb = XLSX.utils.book_new();
    const ws = buildExcelSheet(monthStr);
    XLSX.utils.book_append_sheet(wb, ws, monthStr || '검침결과');
    XLSX.writeFile(wb, `전기실_전력사용량_${monthStr || '검침결과'}.xlsx`, {cellStyles: true});
    showToast('엑셀 파일이 다운로드되었습니다.', 'success');
  } catch(e) {
    showToast('다운로드 중 오류가 발생했습니다.', 'error');
    console.error(e);
  }
}

function buildExcelSheet(monthStr) {
  const aoa = [];

  // ---- 헬퍼 함수 ----
  function getV(sid, ck, field='current') {
    const d = inputData[sid] && inputData[sid][ck];
    if (!d) return null;
    const v = d[field];
    return (v === '' || v === undefined || v === null) ? null : parseFloat(v) || v;
  }
  function getPrev(sid, ck) {
    const pd = PREV_DATA[sid];
    if (!pd || !pd[ck]) return null;
    return pd[ck].prev;
  }
  function getRatio(sid, ck) {
    const pd = PREV_DATA[sid];
    if (!pd || !pd[ck]) return null;
    return pd[ck].ratio;
  }
  function getJasang(sid, ck) {
    const d = inputData[sid] && inputData[sid][ck];
    return d && d.jasang !== '' ? parseFloat(d.jasang) : null;
  }
  function getJinsang(sid, ck) {
    const d = inputData[sid] && inputData[sid][ck];
    if (!d || d.jinsang === '' || d.jinsang === undefined) return null;
    const raw = parseFloat(d.jinsang);
    if (isNaN(raw)) return null;
    const unit = d.jinsangUnit || 'mvarh';
    if (unit === 'kvarh') return raw / 1000;
    if (unit === 'varh')  return raw / 1000000;
    return raw;
  }
  function mvarSum(sid, ck) {
    const j = getJasang(sid, ck), ji = getJinsang(sid, ck);
    if (j === null && ji === null) return null;
    return (j||0) + (ji||0);
  }
  function hwMvar(ck) {
    const d = inputData['hwawon'] && inputData['hwawon'][ck];
    if (!d || (!d.jasang && !d.jinsang)) return null;
    const j = parseFloat(d.jasang)||0;
    const raw = parseFloat(d.jinsang)||0;
    const unit = d.jinsangUnit || 'mvarh';

    getJasang('hwawon','1호계'),getJasang('hwawon','2호계'),getJasang('hwawon','3호계'),getJasang('hwawon','3호계-1'),
    getJasang('seolhwa','1호계'),getJasang('seolhwa','2호계'),getJasang('seolhwa','3호계'),getJasang('seolhwa','3호계-1')]);

  // r=40 엑셀41행: 진상무효
  aoa.push(['4째줄\n(진상무효)',
    getJinsang('hwawon','1호계'),getJinsang('hwawon','2호계'),getJinsang('hwawon','3호계'),getJinsang('hwawon','3호계-1'),
    getJinsang('seolhwa','1호계'),getJinsang('seolhwa','2호계'),getJinsang('seolhwa','3호계'),getJinsang('seolhwa','3호계-1')]);

  // r=41 엑셀42행: 합계 (수식)
  aoa.push(['합         계',
    '=B40+B41','=C40+C41','=D40+D41','=E40+E41',
    '=F40+F41','=G40+G41','=H40+H41','=I40+I41']);

  // ============================================================
  // 워크시트 생성
  // ============================================================
  const ws = XLSX.utils.aoa_to_sheet(aoa);

  // --- 수식 셀 타입 수정 (aoa는 문자열로 넣기 때문에 t:'n', f 속성으로 재설정) ---
  // 수식 문자열로 들어간 셀을 찾아서 타입을 수식으로 변환
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let r = range.s.r; r <= range.e.r; r++) {
    for (let c = range.s.c; c <= range.e.c; c++) {
      const addr = XLSX.utils.encode_cell({r, c});
      if (!ws[addr]) continue;
      const v = ws[addr].v;
      if (typeof v === 'string' && v.startsWith('=')) {
        ws[addr] = { t:'n', f: v.slice(1), v:0 };
      }
    }
  }

  // --- 열 너비 ---
  ws['!cols'] = Array(19).fill({wch: 10.3});

  // --- 행 높이: 2행(r=1) 이후 전체 16.5hpt ---
  const totalRows = aoa.length;
  ws['!rows'] = [];
  for (let r = 1; r < totalRows; r++) {
    ws['!rows'][r] = {hpt: 16.5};
  }

  // --- 병합 셀 (r=aoa인덱스, c=0-indexed열) ---
  ws['!merges'] = [
    // 제목 r=0
    {s:{r:0,c:0}, e:{r:0,c:18}},

    // 상단 구분 r=2~3
    {s:{r:2,c:0}, e:{r:3,c:0}},
    {s:{r:2,c:1}, e:{r:2,c:3}},
    {s:{r:2,c:4}, e:{r:2,c:6}},
    {s:{r:2,c:7}, e:{r:2,c:9}},
    {s:{r:2,c:10}, e:{r:2,c:12}},
    {s:{r:2,c:13}, e:{r:2,c:15}},
    {s:{r:2,c:16}, e:{r:2,c:18}},

    // 전력량합계 상단 r=9
    {s:{r:9,c:1}, e:{r:9,c:3}},
    {s:{r:9,c:4}, e:{r:9,c:6}},
    {s:{r:9,c:7}, e:{r:9,c:9}},
    {s:{r:9,c:10}, e:{r:9,c:12}},
    {s:{r:9,c:13}, e:{r:9,c:15}},
    {s:{r:9,c:16}, e:{r:9,c:18}},

    // 중간 구분 r=11~12
    {s:{r:11,c:0}, e:{r:12,c:0}},
    {s:{r:11,c:1}, e:{r:11,c:3}},
    {s:{r:11,c:4}, e:{r:11,c:6}},
    {s:{r:11,c:7}, e:{r:11,c:9}},
    {s:{r:11,c:10}, e:{r:11,c:12}},

    // 중간 전력량합계 r=18
    {s:{r:18,c:1}, e:{r:18,c:3}},
    {s:{r:18,c:4}, e:{r:18,c:6}},
    {s:{r:18,c:7}, e:{r:18,c:9}},
    {s:{r:18,c:10}, e:{r:18,c:12}},

    // 디지털 구분 r=20~22
    {s:{r:20,c:0}, e:{r:22,c:0}},
    {s:{r:20,c:1}, e:{r:20,c:8}},
    {s:{r:20,c:9}, e:{r:20,c:16}},

    // 유효/무효 r=21
    {s:{r:21,c:1}, e:{r:21,c:4}},
    {s:{r:21,c:5}, e:{r:21,c:8}},
    {s:{r:21,c:9}, e:{r:21,c:12}},
    {s:{r:21,c:13}, e:{r:21,c:16}},

    // 전력량합계 디지털 r=27 (화원 B~E, F~I / 설화명곡 J~M, N~Q)
    {s:{r:27,c:1}, e:{r:27,c:4}},
    {s:{r:27,c:5}, e:{r:27,c:8}},
    {s:{r:27,c:9}, e:{r:27,c:12}},
    {s:{r:27,c:13}, e:{r:27,c:16}},

    // 배류기/충전소 헤더 r=29 (Q30:R30 병합 제거)

    // I31:I32 병합→구분, N31:N32 병합→구분
    {s:{r:30,c:8}, e:{r:31,c:8}},
    {s:{r:30,c:13}, e:{r:31,c:13}},

    // A37:A38 병합→구분 (r=36~37, c=0)
    {s:{r:36,c:0}, e:{r:37,c:0}},
    // 37행 B~E병합→화원, F~I병합→설화명곡 (r=36)
    {s:{r:36,c:1}, e:{r:36,c:4}},
    {s:{r:36,c:5}, e:{r:36,c:8}},
    // 38행 B~E병합→무효(MVARh), F~I병합→무효(MVARh) (r=37)
    {s:{r:37,c:1}, e:{r:37,c:4}},
    {s:{r:37,c:5}, e:{r:37,c:8}},
  ];

  // --- 서식 정의 ---
  const titleFont   = {name:'굴림체', sz:24};
  const bodyFont    = {name:'굴림', sz:10};
  const redFont     = {name:'굴림', sz:10, color:{rgb:'FF0000'}};
  const centerAlign = {horizontal:'center', vertical:'center'};
  const yellowFill  = {patternType:'solid', fgColor:{rgb:'FFFF99'}};
  const blueHair    = {style:'hair', color:{rgb:'0000FF'}};
  const blueSolid   = {style:'thin', color:{rgb:'0000FF'}};
  const hairBorder  = {top:blueHair, bottom:blueHair, left:blueHair, right:blueHair};
  const solidBorder = {top:blueSolid, bottom:blueSolid, left:blueSolid, right:blueSolid};

  // --- 헬퍼 ---
  function applyFill(r, cS, cE) {
    for (let c = cS; c <= cE; c++) {
      const addr = XLSX.utils.encode_cell({r, c});
      if (!ws[addr]) ws[addr] = {v:'', t:'s'};
      ws[addr].s = Object.assign({}, ws[addr].s||{}, {fill:yellowFill, font:bodyFont, alignment:centerAlign});
    }
  }
  function applyBorderRange(rS, rE, cS, cE, border) {
    for (let r = rS; r <= rE; r++)
      for (let c = cS; c <= cE; c++) {
        const addr = XLSX.utils.encode_cell({r, c});
        if (!ws[addr]) ws[addr] = {v:'', t:'s'};
        ws[addr].s = Object.assign({}, ws[addr].s||{}, {border});
      }
  }

  // --- 채우기 ---
  [2,3].forEach(r => applyFill(r, 0, 18));        // 엑셀3~4행 A~S
  [11,12].forEach(r => applyFill(r, 0, 12));       // 엑셀12~13행 A~M
  [20,21,22].forEach(r => applyFill(r, 0, 16));    // 엑셀21~22~23행 A~Q
  [30,31].forEach(r => applyFill(r, 8, 11));       // 엑셀31~32행 I~L 배류기 제목행
  [30,31].forEach(r => applyFill(r, 13, 14));      // 엑셀31~32행 N~O 충전소 제목행
  [36,37].forEach(r => applyFill(r, 0, 8));        // 엑셀37~38행 A~I 연노랑

  // --- 테두리 ---
  applyBorderRange(2, 9, 0, 18, hairBorder);       // A3:S10
  applyBorderRange(11, 18, 0, 12, hairBorder);     // A12:M19
  applyBorderRange(20, 27, 0, 16, hairBorder);     // A21:Q28
  applyBorderRange(30, 34, 8, 11, hairBorder);     // I31:L35 배류기 표
  applyBorderRange(30, 34, 13, 14, hairBorder);    // N31:O35 충전소 표
  applyBorderRange(36, 41, 0, 8, solidBorder);     // A37:I42 파란 실선

  // I30, N30 좌측정렬
  ['I30','N30'].forEach(addr => {
    const r = 29, c = addr === 'I30' ? 8 : 13;
    const a = XLSX.utils.encode_cell({r, c});
    if (!ws[a]) ws[a] = {v: addr === 'I30' ? '<배류기 전력사용량>' : '<전기차 충전소 전력사용량>', t:'s'};
    ws[a].s = Object.assign({}, ws[a].s||{}, {alignment:{horizontal:'left', vertical:'center'}, font:bodyFont});
  });

  // --- 대각선 D5~D7, D10 (엑셀5~7행, 10행 → r=4,5,6,9) ---
  [4,5,6,9].forEach(r => {
    const addr = XLSX.utils.encode_cell({r, c:3});
    if (!ws[addr]) ws[addr] = {v:'', t:'s'};
    ws[addr].s = Object.assign({}, ws[addr].s||{}, {diagonalDown:true, diagonalUp:false, diagonal:blueHair});
  });

  // --- 금월지침 빨간색 (r=5 상단, r=14 중간, r=23 디지털, r=32 배류기) ---
  [5, 14, 23, 32].forEach(r => {
    for (let c = 0; c <= 18; c++) {
      const addr = XLSX.utils.encode_cell({r, c});
      if (!ws[addr] || typeof ws[addr].v !== 'number') continue;
      ws[addr].s = Object.assign({}, ws[addr].s||{}, {font:redFont});
    }
  });

  // --- 제목 서식 ---
  if (ws['A1']) ws['A1'].s = {font:titleFont, alignment:centerAlign};

  // --- 기본 서식 ---
  for (let r = 1; r < totalRows; r++) {
    for (let c = 0; c <= 18; c++) {
      const addr = XLSX.utils.encode_cell({r, c});
      if (!ws[addr]) continue;
      const s = ws[addr].s || {};
      if (s.fill || s.border || s.diagonalDown) {
        if (!s.font) s.font = bodyFont;
        if (!s.alignment) s.alignment = typeof ws[addr].v === 'number' ? {vertical:'center'} : centerAlign;
        ws[addr].s = s;
      } else {
        ws[addr].s = {
          font: typeof ws[addr].v === 'number' && s.font ? s.font : bodyFont,
          alignment: typeof ws[addr].v === 'number' ? {vertical:'center'} : centerAlign,
        };
        if (s.font && s.font.color) ws[addr].s.font = s.font; // 빨간색 유지
      }
    }
  }

  // A36 bold + 좌측정렬 (기본 서식 루프 후 마지막에 적용)
  const a36 = XLSX.utils.encode_cell({r:35, c:0});
  if (ws[a36]) ws[a36].s = {font:{name:'굴림', sz:10, bold:false}, alignment:{horizontal:'left', vertical:'center'}};

  // --- 숫자 포맷 적용 ---
  function setFmt(r, cStart, cEnd, fmt) {
    for (let c = cStart; c <= cEnd; c++) {
      const addr = XLSX.utils.encode_cell({r, c});
      if (!ws[addr]) continue;
      ws[addr].z = fmt;
    }
  }

  const fmt2  = '0.00';        // 소수점 2자리
  const fmtK  = '#,##0';       // 천단위 콤마
  const fmtK2 = '#,##0.00';    // 천단위 + 소수점 2자리 (필요시)

  // 상단 테이블 (엑셀 6~10행 = r=5~9, B~S = c=1~18)
  // 금월지침(r=5), 전월지침(r=6), 사용지침(r=7): 소수점 2자리
  [5, 6, 7].forEach(r => setFmt(r, 1, 18, fmt2));
  // 배율(r=4), 사용량(r=8), 전력량합계(r=9): 천단위 콤마
  [4, 8, 9].forEach(r => setFmt(r, 1, 18, fmtK));

  // 중간 테이블 (엑셀 15~19행 = r=14~18, B~M = c=1~12)
  // 금월지침(r=14), 전월지침(r=15), 사용지침(r=16): 소수점 2자리
  [14, 15, 16].forEach(r => setFmt(r, 1, 12, fmt2));
  // 배율(r=13), 사용량(r=17), 전력량합계(r=18): 천단위 콤마
  [13, 17, 18].forEach(r => setFmt(r, 1, 12, fmtK));

  // 디지털 테이블 (엑셀 24~26행 = r=23~25, B~Q = c=1~16)
  // 금월지침(r=23), 전월지침(r=24), 사용지침(r=25): 소수점 2자리
  [23, 24, 25].forEach(r => setFmt(r, 1, 16, fmt2));

  // 배류기 표 (엑셀 33~35행 = r=32~34, J~L=c=9~11, O=c=14)
  // 금월지침(r=32), 전월지침(r=33), 사용량(r=34): 소수점 2자리
  [32, 33, 34].forEach(r => {
    setFmt(r, 9, 11, fmt2);  // J~L 배류기
    setFmt(r, 14, 14, fmt2); // O 충전소
  });

  // 무효분 표 (엑셀 40~42행 = r=39~41, B~I = c=1~8)
  // 지상무효(r=39), 진상무효(r=40), 합계(r=41): 소수점 2자리
  [39, 40, 41].forEach(r => setFmt(r, 1, 8, fmt2));

  return ws;
}

// PHOTO DOWNLOAD
// ===========================
function downloadPhotos() {
  const photos = inputData['wolbae_base'] && inputData['wolbae_base']['전기차충전소']
    ? (inputData['wolbae_base']['전기차충전소'].photos || [])
    : [];
  if (photos.length === 0) {
    showToast('첨부된 사진이 없습니다.', 'error');
    return;
  }
  const monthStr = getSelectedMonthStr();
  photos.forEach((p, idx) => {
    const ext = p.src.match(/^data:image\/(\w+);base64,/)?.[1] || 'jpg';
    const a = document.createElement('a');
    a.href = p.src;
    a.download = `${monthStr} 월배 전기차충전소 전력량계${photos.length > 1 ? '_' + (idx+1) : ''}.${ext}`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });
  showToast(`사진 ${photos.length}장 다운로드됩니다.`, 'success');
}

let db = null;

function initFirebase() {
  try {
    if (typeof firebase !== 'undefined' && !firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    db = firebase.firestore();
  } catch(e) {
    console.error('Firebase 초기화 오류:', e);
  }
}

function getMonthKey() {
  return document.getElementById('selectedMonth').value || '';
}

// 선택된 월의 전달 키 반환 (예: 2026-05 → 2026-04)
function getPrevMonthKey() {
  const val = getMonthKey();
  if (!val) return '';
  const [y, m] = val.split('-').map(Number);
  const prevDate = new Date(y, m - 2, 1); // month는 0-indexed
  const py = prevDate.getFullYear();
  const pm = String(prevDate.getMonth() + 1).padStart(2, '0');
  return `${py}-${pm}`;
}

function saveToFirebase() {
  if (!db) return;
  const monthKey = getMonthKey();
  if (!monthKey) return;
  const dataToSave = {};
  Object.keys(inputData).forEach(sid => {
    dataToSave[sid] = {};
    Object.keys(inputData[sid]).forEach(ck => {
      const d = inputData[sid][ck];
      dataToSave[sid][ck] = {
        current: d.current || '',
        jasang: d.jasang || '',
        jinsang: d.jinsang || '',
        jinsangUnit: d.jinsangUnit || 'mvarh',
        usageDiff: (d.usageDiff !== undefined && d.usageDiff !== null) ? d.usageDiff : '',
        inspector: d.inspector || '',
      };
    });
  });
  db.collection('meters').doc(monthKey).set(dataToSave, { merge: true })
    .then(() => console.log('Firebase 저장 완료'))
    .catch(e => console.error('Firebase 저장 오류:', e));
}

function loadFromFirebase(callback) {
  if (!db) { if (callback) callback(); return; }
  const monthKey = getMonthKey();
  if (!monthKey) { if (callback) callback(); return; }

  const prevMonthKey = getPrevMonthKey();

  // 현재 월 + 전달 데이터 동시 로드
  const currentLoad = db.collection('meters').doc(monthKey).get();
  const prevLoad = prevMonthKey ? db.collection('meters').doc(prevMonthKey).get() : Promise.resolve(null);

  Promise.all([currentLoad, prevLoad]).then(([doc, prevDoc]) => {
    // 현재 월 데이터 로드
    if (doc.exists) {
      const data = doc.data();
      Object.keys(data).forEach(sid => {
        if (!inputData[sid]) inputData[sid] = {};
        Object.keys(data[sid]).forEach(ck => {
          const d = data[sid][ck];
          if (!inputData[sid][ck]) inputData[sid][ck] = { current: '', photos: [] };
          inputData[sid][ck].current = d.current || '';
          inputData[sid][ck].jasang = d.jasang || '';
          inputData[sid][ck].jinsang = d.jinsang || '';
          inputData[sid][ck].jinsangUnit = d.jinsangUnit || 'mvarh';
          inputData[sid][ck].usageDiff = (d.usageDiff !== undefined && d.usageDiff !== '') ? parseFloat(d.usageDiff) : undefined;
          inputData[sid][ck].inspector = d.inspector || '';
        });
      });
    }

    // 전달 데이터 저장 (전월지침으로 사용)
    prevMonthFirebaseData = (prevDoc && prevDoc.exists) ? prevDoc.data() : null;

    if (callback) callback();
  }).catch(e => { console.error('Firebase 불러오기 오류:', e); if (callback) callback(); });
}

let unsubscribe = null;
function startRealtimeSync() {
  if (!db) return;
  const monthKey = getMonthKey();
  if (!monthKey) return;
  if (unsubscribe) unsubscribe();
  unsubscribe = db.collection('meters').doc(monthKey).onSnapshot(doc => {
    if (!doc.exists) return;
    const data = doc.data();
    Object.keys(data).forEach(sid => {
      if (!inputData[sid]) inputData[sid] = {};
      Object.keys(data[sid]).forEach(ck => {
        const d = data[sid][ck];
        if (!inputData[sid][ck]) inputData[sid][ck] = { current: '', photos: [] };
        if (sid === currentStation?.id && ck === currentCircuit) return;
        inputData[sid][ck].current = d.current || '';
        inputData[sid][ck].jasang = d.jasang || '';
        inputData[sid][ck].jinsang = d.jinsang || '';
        inputData[sid][ck].jinsangUnit = d.jinsangUnit || 'mvarh';
        inputData[sid][ck].usageDiff = (d.usageDiff !== undefined && d.usageDiff !== '') ? parseFloat(d.usageDiff) : undefined;
        inputData[sid][ck].inspector = d.inspector || '';
      });
    });
    renderStations();
    updateProgress();
  }, e => console.error('실시간 동기화 오류:', e));
}
